<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22C55E" />
            <stop offset="100%" stop-color="#A855F7" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- Background Frame roughly matching a lens -->
    <circle cx="50" cy="50" r="42" fill="#0F0F0F" stroke="url(#neonGradient)" stroke-width="4" filter="url(#glow)"/>
    <!-- Abstract Data Nodes -->
    <path d="M 30 65 L 45 40 L 55 55 L 70 30" fill="none" stroke="#EDEDED" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="30" cy="65" r="4" fill="#22C55E" filter="url(#glow)"/>
    <circle cx="45" cy="40" r="4" fill="#A855F7" filter="url(#glow)"/>
    <circle cx="55" cy="55" r="4" fill="#EC4899" filter="url(#glow)"/>
    <circle cx="70" cy="30" r="4" fill="#22C55E" filter="url(#glow)"/>
</svg>
